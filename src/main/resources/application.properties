server.address=0.0.0.0

spring.application.name=logs

spring.datasource.url=jdbc:mysql://localhost:3306/db_logs
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Aqui dizemos que o hibernate não vai mais ter a responsabilidade de gerenciar as estruturas do banco. Isso ficará a
#cargo do flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#Essa propriedade serve para ativarmos o Flyway
spring.flyway.enabled=true

#Essa propriedade para criar uma tabela com as migrações e assim ter acesso ao histórico de modificações.
spring.flyway.baseline-on-migrate=true 